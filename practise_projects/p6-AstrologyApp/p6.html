<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./p6.css">
</head>
<body style="color: rgb(255, 255, 255); display: flex; justify-content: center; align-items: center; height: 100vh; background-color: black;" >
    <div id="parent" style="background-color: rgb(4, 119, 226); padding: 15px;">
        <h1 style="text-align: center;">ASTROLOGY INSIGHTS</h1>
        <form >
            <label for="name">First Name:</label>
            <br>
            <input type="text" id="name" required>
            <br><br>
            <label for="surname">Surname:</label>
            <br>
            <input type="text" id="surname" required>
            <br><br>
            <label for="day">Date of Birth (Day):</label>
            <br>
            <input type="number" id="day" required min="1" max="31">
            <br><br>
            <label for="month">Month:</label>
            <br>
            <input type="number" id="month" required min="1" max="12">
            <br><br>
            <label for="year">Year:</label>
            <br>
            <input type="number" id="year" required min="1920" max="2050">
            <br>
            <button type="submit" id="button">Get Insights</button>

        </form>
        <div id="result" style="background-color:rgb(0, 60, 255); margin-top: 15px; color:rgb(255, 255, 255); padding: 10px; border-radius: 5px;"></div>

    </div>
</body>
<script src="./p6.js"></script>
</html>
